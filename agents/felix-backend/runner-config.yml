# Backend Dev Agent — Runner Config

producer_role: backend-dev
playbook_types: [software-dev]

# Model routing
model_tier: standard
eval_spec: eval-spec.yml
resolved_model: null

# Tool catalog — standard names (Write/Read/Bash/WebSearch/WebFetch)
tool_catalog:
  - name: Read
    description: Read API contracts, schema files, existing source code, PRD
    scope: workspace
  - name: Write
    description: Write source code, migration files, config files, test files
    scope: workspace
  - name: Bash
    restriction: full
    description: Code execution, npm/node, database migrations, git, test runners, bridge curl
  - name: WebSearch
    description: Research library docs, error solutions, API references
    scope: unrestricted
  - name: WebFetch
    description: Read library documentation and API reference pages
    scope: unrestricted

# Execution model
execution_mode: turn-based
max_tool_calls_per_turn: 20      # code tasks need many read/write/bash cycles
context_window_budget: 80000
retire_on: crew_tasks_complete

# Work-announcement (DECISION-20260529-013)
work_start_template: "WORK_START {task_id}: {summary}"
work_complete_template: "WORK_COMPLETE {task_id}: {outcome}"
announcement_target: "iris-coord-{workspace_slug}"
announcement_kind: ack
